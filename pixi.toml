[workspace]
authors   = ["Kyle Shannon <kyle@kmshannon.com>"]
channels  = ["conda-forge"]
name      = "subiculum-rnn"
platforms = ["osx-arm64", "linux-64"]
version   = "0.1.0"


###################### ======== TASKS ======== ######################
[tasks]
# Data pipeline
data-synthetic = "python -m src.data.synthetic --config configs/data/synthetic.yaml"

# Training
train       = "python -m src.train --config-dir configs"
train-debug = "python -m src.train --config-dir configs --config-name debug"

# Analysis

# Testing
test = "pytest tests/ -v --cov=src --cov-report=term-missing"


###################### ======== DEPENDENCIES ======== ######################
[dependencies]
# Core ML
python  = "=3.12"
pytorch = ">=2.1,<3"
einops  = ">=0.7"
numpy   = ">=1.26"
scipy   = ">=1.11"

# Data I/O
pynwb    = ">=2.5"
dandi    = ">=0.58"
zarr     = ">=3,<4"
xarray   = ">=2023.6"

# Visualization
matplotlib = ">=3.8"
seaborn    = ">=0.13"

# Validation and Stats
pymc = ">=5.10.0"
arviz = "=1.1.0"
nutpie = ">=0.15.0"

[pypi-dependencies]
pynapple = ">=0.4"

###################### ======== DEV / CUDA FEATURES ======== ######################
[feature.dev.dependencies]
pip          = "*"
pytest       = ">=7.4"
pytest-cov   = "*"
pytest-xdist = "*"
jupyter      = "*"
ipython      = "*"
ipytest      = "*"

# ---- cuda feature: GPU builds, Linux clusters etc. ----
[feature.cuda]
platforms = ["linux-64"]

[feature.cuda.system-requirements]
cuda = "12"

[feature.cuda.dependencies]
pytorch = { version = ">=2.1,<3", build = "cuda*" }


###################### ======== ENVS ======== ######################
[environments]
default = { features = ["dev"] }
cuda    = { features = ["dev", "cuda"] }
